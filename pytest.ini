[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: Unit tests (no external dependencies)
        integration: Integration tests (require gmsh, calculix)
            slow: Slow tests (batch processing)
            addopts = -v --tb=short
            filterwarnings =
                ignore::DeprecationWarning