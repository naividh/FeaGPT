name: FeaGPT CI/CD

on:
  push:
      branches: [main, develop]
        pull_request:
            branches: [main]

            env:
              PYTHON_VERSION: "3.11"
                PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
                  SERVICE_NAME: feagpt-api
                    REGION: us-central1

                    jobs:
                      lint:
                          runs-on: ubuntu-latest
                              steps:
                                    - uses: actions/checkout@v4
                                          - name: Set up Python
                                                  uses: actions/setup-python@v5
                                                          with:
                                                                    python-version: ${{ env.PYTHON_VERSION }}
                                                                          - name: Install linting tools
                                                                                  run: pip install flake8 black isort mypy
                                                                                        - name: Run flake8
                                                                                                run: flake8 feagpt/ tests/ --max-line-length=120 --ignore=E501,W503
                                                                                                      - name: Check black formatting
                                                                                                              run: black --check feagpt/ tests/
                                                                                                                    - name: Check import sorting
                                                                                                                            run: isort --check-only feagpt/ tests/

                                                                                                                              test:
                                                                                                                                  runs-on: ubuntu-latest
                                                                                                                                      needs: lint
                                                                                                                                          steps:
                                                                                                                                                - uses: actions/checkout@v4
                                                                                                                                                      - name: Set up Python
                                                                                                                                                              uses: actions/setup-python@v5
                                                                                                                                                                      with:
                                                                                                                                                                                python-version: ${{ env.PYTHON_VERSION }}
                                                                                                                                                                                      - name: Cache pip packages
                                                                                                                                                                                              uses: actions/cache@v4
                                                                                                                                                                                                      with:
                                                                                                                                                                                                                path: ~/.cache/pip
                                                                                                                                                                                                                          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
                                                                                                                                                                                                                                - name: Install dependencies
                                                                                                                                                                                                                                        run: |
                                                                                                                                                                                                                                                  pip install -e ".[dev]"
                                                                                                                                                                                                                                                            pip install pytest pytest-cov
                                                                                                                                                                                                                                                                  - name: Run unit tests
                                                                                                                                                                                                                                                                          run: pytest tests/ -v --cov=feagpt --cov-report=xml --cov-report=term-missing
                                                                                                                                                                                                                                                                                - name: Upload coverage
                                                                                                                                                                                                                                                                                        uses: codecov/codecov-action@v4
                                                                                                                                                                                                                                                                                                with:
                                                                                                                                                                                                                                                                                                          file: coverage.xml
                                                                                                                                                                                                                                                                                                                    fail_ci_if_error: false

                                                                                                                                                                                                                                                                                                                      test-with-deps:
                                                                                                                                                                                                                                                                                                                          runs-on: ubuntu-latest
                                                                                                                                                                                                                                                                                                                              needs: test
                                                                                                                                                                                                                                                                                                                                  steps:
                                                                                                                                                                                                                                                                                                                                        - uses: actions/checkout@v4
                                                                                                                                                                                                                                                                                                                                              - name: Set up Python
                                                                                                                                                                                                                                                                                                                                                      uses: actions/setup-python@v5
                                                                                                                                                                                                                                                                                                                                                              with:
                                                                                                                                                                                                                                                                                                                                                                        python-version: ${{ env.PYTHON_VERSION }}
                                                                                                                                                                                                                                                                                                                                                                              - name: Install system dependencies
                                                                                                                                                                                                                                                                                                                                                                                      run: |
                                                                                                                                                                                                                                                                                                                                                                                                sudo apt-get update
                                                                                                                                                                                                                                                                                                                                                                                                          sudo apt-get install -y gmsh calculix-ccx
                                                                                                                                                                                                                                                                                                                                                                                                                - name: Install Python dependencies
                                                                                                                                                                                                                                                                                                                                                                                                                        run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                  pip install -e .
                                                                                                                                                                                                                                                                                                                                                                                                                                            pip install pytest
                                                                                                                                                                                                                                                                                                                                                                                                                                                  - name: Run integration tests
                                                                                                                                                                                                                                                                                                                                                                                                                                                          run: pytest tests/ -v -m "integration" --timeout=120
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  continue-on-error: true

                                                                                                                                                                                                                                                                                                                                                                                                                                                                    docker:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        runs-on: ubuntu-latest
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            needs: test
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if: github.ref == 'refs/heads/main'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    steps:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          - uses: actions/checkout@v4
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                - name: Set up Docker Buildx
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        uses: docker/setup-buildx-action@v3
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              - name: Build Docker image
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                docker build -t feagpt:latest .
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          docker build -t feagpt:${{ github.sha }} .
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                - name: Test Docker image
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  docker run --rm feagpt:latest python -c "from feagpt import GMSAPipeline; print('Import OK')"

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    deploy-cloudrun:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        runs-on: ubuntu-latest
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            needs: [test, docker]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if: github.ref == 'refs/heads/main' && github.event_name == 'push'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    steps:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          - uses: actions/checkout@v4
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                - name: Authenticate to Google Cloud
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        uses: google-github-actions/auth@v2
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          credentials_json: ${{ secrets.GCP_SA_KEY }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                - name: Set up Cloud SDK
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        uses: google-github-actions/setup-gcloud@v2
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              - name: Configure Docker for Artifact Registry
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - name: Build and push image
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              IMAGE=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/feagpt/${{ env.SERVICE_NAME }}:${{ github.sha }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        docker build -t $IMAGE .
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  docker push $IMAGE
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        - name: Deploy to Cloud Run
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          gcloud run deploy ${{ env.SERVICE_NAME }} \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/feagpt/${{ env.SERVICE_NAME }}:${{ github.sha }} \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  --region ${{ env.REGION }} \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              --platform managed \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          --memory 4Gi \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      --cpu 2 \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  --timeout 600 \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              --set-env-vars "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          --allow-unauthenticated