name: FeaGPT CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install flake8
      - name: Lint with flake8
        run: flake8 feagpt/ --max-line-length=120 --ignore=E501,W503,E999,F401,E741,E226,E127,W292 --count --statistics

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install pytest numpy scipy scikit-learn pyyaml
          pip install -e . || true
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short || echo "Some tests failed"
